<svg xmlns="http://www.w3.org/2000/svg" width="720" height="720" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Private Balance</title>
  <desc id="desc">Shield logo with rising financial chart and Private Balance wordmark.</desc>
  <defs>
    <linearGradient id="shieldGradient" x1="180" x2="540" y1="150" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#052b6f"/>
      <stop offset="0.48" stop-color="#0a4fa3"/>
      <stop offset="1" stop-color="#43c5ee"/>
    </linearGradient>
    <linearGradient id="barGradient" x1="260" x2="470" y1="310" y2="530" gradientUnits="userSpaceOnUse">
